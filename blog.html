<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog | Bloom & Blush</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Jost&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Jost', sans-serif;
  background: #fff8f9;
  color: #3a1a26;
  margin: 0;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:white;
}

nav a {
  text-decoration:none;
  color:#c2185b;
  margin-left:20px;
}

/* HERO */
.blog-hero {
  padding:100px 40px 60px;
}

.blog-hero h1 {
  font-family:'Playfair Display';
  font-size:3rem;
}

/* GRID */
.blog-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:24px;
  padding:40px;
}

.post-card {
  background:white;
  padding:20px;
  transition:0.3s;
}

.post-card:hover {
  transform:translateY(-6px);
}

.post-img {
  height:180px;
  background:#fce4ec;
  margin-bottom:16px;
}

.post-title {
  font-family:'Playfair Display';
  font-size:1.2rem;
}

.post-link {
  color:#c2185b;
  text-decoration:none;
  font-size:0.8rem;
}
</style>
</head>

<body>

<nav>
  <a href="index.html">Bloom & Blush</a>
  <div>
    <a href="blog.html">Blog</a>
  </div>
</nav>

<section class="blog-hero">
  <h1>Latest Posts</h1>
  <p>Fashion, Beauty & Lifestyle Inspiration ✦</p>
</section>

<section class="blog-grid">

  <div class="post-card">
    <div class="post-img"></div>
    <h3 class="post-title">Spring Outfit Ideas 2026</h3>
    <a href="post1.html" class="post-link">Read More</a>
  </div>

  <div class="post-card">
    <div class="post-img"></div>
    <h3 class="post-title">Best Skincare Routine</h3>
    <a href="post2.html" class="post-link">Read More</a>
  </div>

  <div class="post-card">
    <div class="post-img"></div>
    <h3 class="post-title">Amazon Beauty Haul Under €25</h3>
    <a href="post3.html" class="post-link">Read More</a>
  </div>

</section>

</body>
</html>
